<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审计模型与疑点管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:12px}
.header h1{font-size:1.1em;color:#d2a8ff;display:flex;align-items:center;gap:8px}
.header .actions{flex:1;display:flex;gap:8px;justify-content:flex-end}
.header button{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8em;border:1px solid #30363d;white-space:nowrap}
.btn-primary{background:#7c3aed;border-color:#7c3aed!important;color:#fff}
.btn-accent{background:#238636;border-color:#238636!important;color:#fff}
.btn-warn{background:#9a6700;border-color:#9a6700!important;color:#fff}
.btn-normal{background:#21262d;color:#c9d1d9}
.btn-danger{background:#8b1a1a;border-color:#8b1a1a!important;color:#fff}
.header button:hover{filter:brightness(1.2)}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:10px 12px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:8px}
.sidebar-header span{font-weight:bold;font-size:0.85em;color:#8b949e}
.sidebar-header .count{font-size:0.75em;background:#7c3aed;color:#fff;padding:2px 8px;border-radius:10px}
.model-list{flex:1;overflow-y:auto;padding:6px}
.model-item{padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:8px}
.model-item:hover{border-color:#30363d;background:#1c2128}
.model-item.active{border-color:#7c3aed;background:#1a1630}
.model-item .icon{font-size:1.3em}
.model-item .info{flex:1;min-width:0}
.model-item .info .name{font-size:0.82em;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-item .info .cat{font-size:0.7em;color:#8b949e}
.model-item .info .count{font-size:0.7em;color:#58a6ff}
.sidebar-footer{padding:10px;border-top:1px solid #30363d}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px}
.empty-state{text-align:center;padding:80px 20px;color:#484f58}
.empty-state .icon{font-size:3em;margin-bottom:16px}
.empty-state p{font-size:0.9em;line-height:1.8}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid #30363d}
.tab{padding:8px 20px;cursor:pointer;border-radius:6px 6px 0 0;font-size:0.85em;color:#8b949e;border:1px solid transparent;border-bottom:none;background:transparent}
.tab:hover{color:#c9d1d9}
.tab.active{color:#d2a8ff;border-color:#30363d;border-bottom-color:#0d1117;background:#0d1117;margin-bottom:-2px;border-bottom:2px solid #0d1117}

/* Form */
.form-group{margin-bottom:12px}
.form-group label{display:block;color:#8b949e;font-size:0.75em;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:7px 10px;border-radius:6px;font-family:inherit;font-size:0.85em}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#58a6ff;outline:none}
.form-group textarea{resize:vertical;min-height:60px;font-family:monospace;font-size:0.78em;line-height:1.5}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}

/* Findings table */
.table-wrap{overflow-x:auto;margin-top:8px}
.table-wrap th.sticky-chk,.table-wrap td.sticky-chk{position:sticky;left:0;z-index:2;min-width:28px}
.table-wrap th.sticky-num,.table-wrap td.sticky-num{position:sticky;left:28px;z-index:2;min-width:30px}
.table-wrap th.sticky-chk,.table-wrap th.sticky-num{z-index:3;background:#1c2128}
.table-wrap td.sticky-chk,.table-wrap td.sticky-num{background:#0d1117}
tr.selected td.sticky-chk,tr.selected td.sticky-num{background:#1a1630}
tr:hover td.sticky-chk,tr:hover td.sticky-num{background:#161b22}
table{width:100%;border-collapse:collapse;font-size:0.78em}
th{text-align:left;padding:8px 10px;background:#1c2128;color:#8b949e;font-weight:normal;border-bottom:2px solid #30363d;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #21262d;vertical-align:middle}
tr:hover td{background:#161b22}
tr.selected td{background:#1a1630}
td .cell-input{background:transparent;border:1px solid transparent;color:inherit;padding:3px 6px;border-radius:3px;font-family:inherit;font-size:inherit;width:100%;min-width:60px}
td .cell-input:focus{border-color:#58a6ff;background:#0d1117;outline:none}
td .cell-input.num{width:70px;text-align:right}
.actions-cell{white-space:nowrap;text-align:center}
.actions-cell button{padding:3px 8px;border-radius:4px;cursor:pointer;font-size:0.75em;border:1px solid #30363d;background:#21262d;color:#c9d1d9;margin:1px}
.actions-cell button.danger{color:#ff7b72}
.actions-cell button:hover{background:#30363d}

/* Section */
.section-title{font-size:0.9em;color:#d2a8ff;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-title .badge{font-size:0.75em;background:#7c3aed;color:#fff;padding:2px 8px;border-radius:10px}
.section-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 24px;border-radius:8px;font-size:0.85em;z-index:99999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:#8b1a1a}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;display:flex;align-items:center;justify-content:center}
.modal{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;width:500px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h3{color:#d2a8ff;margin-bottom:14px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Category tags */
.cat-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7em;background:#1f3a5f;color:#58a6ff;margin:1px}

/* Help text */
.help{font-size:0.72em;color:#484f58;margin-top:4px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>⚙️ 审计模型与疑点管理</h1>
    <span style="color:#8b949e;font-size:0.8em">|</span>
    <span style="color:#8b949e;font-size:0.78em">管理审计模型下拉框选项及各模型对应的疑点清单</span>
    <div class="actions">
        <button class="btn-normal" onclick="exportAll()">📥 导出全部数据</button>
        <button class="btn-normal" onclick="document.getElementById('importFile').click()">📤 导入数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAll(event)">
        <button class="btn-warn" onclick="resetToDefault()">🔄 恢复默认</button>
        <button class="btn-accent" onclick="window.open('audit_tool.html','_blank')">🔗 打开主工具</button>
    </div>
</div>

<!-- Main -->
<div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span>📋 审计模型列表</span>
            <span class="count" id="modelCount">0</span>
        </div>
        <div class="model-list" id="modelList"></div>
        <div class="sidebar-footer">
            <button class="btn-primary" style="width:100%" onclick="addModel()">＋ 新建审计模型</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content" id="contentArea">
        <div class="empty-state">
            <div class="icon">📋</div>
            <p>选择一个模型进行编辑<br>或点击左侧 <b style="color:#7c3aed">＋ 新建审计模型</b></p>
            <p style="font-size:0.8em;color:#484f58">模型下拉框选项 + 每个模型对应的疑点清单统一管理</p>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>


<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
// ===================================================================
//  Storage key
// ===================================================================
const STORAGE_KEY_MODELS = 'audit_tool_models';
const STORAGE_KEY_FINDINGS = 'audit_tool_findings'; // { modelId: [finding, ...] }

// ===================================================================
//  Default data (fallback)
// ===================================================================
const DEFAULT_MODELS = [
    { id:'pv_hours_anomaly',    name:'光伏发电小时异常模型',  icon:'☀️', category:'新能源审计',
      desc:'识别月均发电小时数低于60小时的分布式光伏用户，排查发电异常、设备故障或虚报并网容量。',
      fields:'户名,地址,并网容量(kW),并网时间,月均发电小时', threshold:'月发电小时数 < 60小时' },

    { id:'farmland_occupation',  name:'耕地占用检测模型',      icon:'🌾', category:'土地审计',
      desc:'通过卫星影像对比分析，识别新增建设用地是否占用基本农田或耕地。',
      fields:'地块编号,位置,占地面积(亩),原用途,现用途,变化年份', threshold:'耕地→非农建设 且 未经审批' },
    { id:'water_pollution',      name:'水体污染遥感模型',      icon:'💧', category:'环保审计',
      desc:'利用多光谱遥感数据分析水体颜色异常、富营养化、悬浮物浓度变化。',
      fields:'水体名称,位置,面积(km²),水质等级,异常类型,检测时间', threshold:'NDWI异常 或 叶绿素a浓度 > 50μg/L' },
    { id:'vegetation_change',    name:'植被覆盖变化模型',      icon:'🌿', category:'生态审计',
      desc:'基于NDVI时序分析，检测植被覆盖显著减少区域。',
      fields:'区域名称,位置,变化面积(ha),NDVI变化量,变化时间段,疑似原因', threshold:'NDVI下降 > 0.3 且 面积 > 1ha' },
    { id:'construction_expansion',name:'建设用地扩张模型',     icon:'🏢', category:'土地审计',
      desc:'监测城市/工业园区建设用地边界变化，核查超规划范围建设。',
      fields:'项目名称,位置,规划面积(ha),实际面积(ha),超出比例,发现时间', threshold:'实际面积 > 规划面积 × 1.1' },
    { id:'mining_boundary',      name:'矿山越界开采模型',      icon:'⛏️', category:'矿产审计',
      desc:'对比采矿权边界与实际开采面，识别越界开采行为。',
      fields:'矿山名称,位置,矿权面积(ha),越界面积(ha),越界方向,检测时间', threshold:'开采面超出矿权边界' },
    { id:'deforestation',        name:'森林砍伐检测模型',      icon:'🌲', category:'林业审计',
      desc:'利用高分辨率卫星影像检测森林覆盖减少，区分合法采伐与非法砍伐。',
      fields:'林班编号,位置,砍伐面积(ha),审批面积(ha),差异面积(ha),检测时间', threshold:'实际砍伐 > 审批面积' },
    { id:'solid_waste',          name:'固废违规堆放模型',      icon:'🗑️', category:'环保审计',
      desc:'通过影像纹理和光谱特征识别疑似固废堆放点。',
      fields:'堆放点编号,位置,占地面积(m²),疑似类型,距离居民区(m),发现时间', threshold:'非规划场地 且 面积 > 500m²' },
    { id:'coastline_change',     name:'海岸线变化监测模型',    icon:'🌊', category:'海洋审计',
      desc:'提取历年海岸线位置，识别侵蚀/淤积变化，核查围填海项目审批合规性。',
      fields:'岸段编号,位置,变化长度(m),变化类型,变化速率(m/年),是否审批', threshold:'围填海 且 未经审批' }
];

const DEFAULT_FINDINGS = {
    'pv_hours_anomaly': [
        { id:'PV001', name:'张永福', addr:'张家港市大新镇永凝路218号',    capacity:15, gridDate:'2023-06-15', monthlyHours:42.5, lng:120.548925, lat:31.975079 },
        { id:'PV002', name:'李建明', addr:'张家港市锦丰镇锦南路56号',     capacity:20, gridDate:'2022-11-20', monthlyHours:38.2, lng:120.619830, lat:31.962410 },
        { id:'PV003', name:'王德发', addr:'张家港市杨舍镇沙洲西路128号',   capacity:10, gridDate:'2023-03-08', monthlyHours:51.7, lng:120.538240, lat:31.873850 },
        { id:'PV004', name:'陈志强', addr:'张家港市塘桥镇北京路33号',     capacity:25, gridDate:'2022-08-12', monthlyHours:29.8, lng:120.652100, lat:31.824300 },
        { id:'PV005', name:'赵永刚', addr:'张家港市凤凰镇凤南路77号',     capacity:12, gridDate:'2023-09-25', monthlyHours:55.1, lng:120.628500, lat:31.789400 },
        { id:'PV006', name:'周明华', addr:'张家港市金港镇长江中路201号',   capacity:30, gridDate:'2022-05-18', monthlyHours:33.6, lng:120.438720, lat:31.937550 },
        { id:'PV007', name:'刘建国', addr:'张家港市乐余镇乐兴路15号',     capacity:18, gridDate:'2023-01-30', monthlyHours:45.3, lng:120.701400, lat:31.902100 },
        { id:'PV008', name:'孙海涛', addr:'张家港市南丰镇南丰大道88号',   capacity:8,  gridDate:'2023-07-10', monthlyHours:57.9, lng:120.684300, lat:31.856700 },
        { id:'PV009', name:'吴国平', addr:'张家港市常阴沙管理区红旗路9号', capacity:22, gridDate:'2022-10-05', monthlyHours:36.4, lng:120.758200, lat:31.838400 },
        { id:'PV010', name:'郑伟强', addr:'张家港市大新镇沿江公路166号',   capacity:16, gridDate:'2023-04-22', monthlyHours:48.8, lng:120.535640, lat:31.991230 }
    ]
};

// ===================================================================
//  State
// ===================================================================
let models = [];
let findingsMap = {}; // { modelId: [finding, ...] }
let selectedModelId = null;
let activeTab = 'model'; // 'model' | 'findings'
let currentPage = 0;      // 疑点清单当前分页
const PAGE_SIZE = 100;    // 每页显示条数
let _saveTimer = null;    // 防抖保存定时器
let _selectedRows = new Set(); // 勾选中的行索引

// ===================================================================
//  Init
// ===================================================================
function init() {
    loadData();
    renderModelList();
    // Auto-select first model
    if (models.length > 0) {
        selectModel(models[0].id);
    }
}

function loadData() {
    try {
        const savedModels = localStorage.getItem(STORAGE_KEY_MODELS);
        models = savedModels ? JSON.parse(savedModels) : JSON.parse(JSON.stringify(DEFAULT_MODELS));
    } catch(e) {
        models = JSON.parse(JSON.stringify(DEFAULT_MODELS));
    }
    try {
        const savedFindings = localStorage.getItem(STORAGE_KEY_FINDINGS);
        findingsMap = savedFindings ? JSON.parse(savedFindings) : JSON.parse(JSON.stringify(DEFAULT_FINDINGS));
    } catch(e) {
        findingsMap = JSON.parse(JSON.stringify(DEFAULT_FINDINGS));
    }
}

function saveData() {
    localStorage.setItem(STORAGE_KEY_MODELS, JSON.stringify(models));
    localStorage.setItem(STORAGE_KEY_FINDINGS, JSON.stringify(findingsMap));
}
function saveDataDebounced() {
    if (_saveTimer) clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => { saveData(); _saveTimer = null; }, 500);
}

// ===================================================================
//  Toast
// ===================================================================
function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ===================================================================
//  Sidebar
// ===================================================================
function renderModelList() {
    document.getElementById('modelCount').textContent = models.length;
    const list = document.getElementById('modelList');
    if (!models.length) {
        list.innerHTML = '<div style="text-align:center;padding:24px;color:#484f58;font-size:0.8em">暂无模型<br>点击下方按钮创建</div>';
        return;
    }
    // Group by category
    const cats = {};
    models.forEach(m => { if(!cats[m.category]) cats[m.category]=[]; cats[m.category].push(m); });
    let html = '';
    for (const [cat, catModels] of Object.entries(cats)) {
        html += '<div style="color:#484f58;font-size:0.7em;padding:6px 8px 2px;text-transform:uppercase">' + cat + '</div>';
        catModels.forEach(m => {
            const fCount = (findingsMap[m.id] || []).length;
            const act = m.id === selectedModelId ? ' active' : '';
            html += '<div class="model-item' + act + '" onclick="selectModel(\'' + m.id + '\')" id="sidebar-' + m.id + '">' +
                '<span class="icon">' + (m.icon || '📋') + '</span>' +
                '<div class="info">' +
                    '<div class="name">' + m.name + '</div>' +
                    '<div class="cat">' + (m.category || '') + '</div>' +
                    '<div class="count">疑点: ' + fCount + ' 条</div>' +
                '</div>' +
            '</div>';
        });
    }
    list.innerHTML = html;
}

function selectModel(id) {
    selectedModelId = id;
    currentPage = 0;
    editingFindingIdx = -1;
    renderModelList();
    renderContent();
}

// ===================================================================
//  Content
// ===================================================================
function renderContent() {
    if (!selectedModelId) {
        document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>选择一个模型进行编辑</p></div>';
        return;
    }
    const m = models.find(x => x.id === selectedModelId);
    if (!m) return;

    const findings = findingsMap[selectedModelId] || [];
    const fieldNames = (m.fields || '').split(',').map(s => s.trim()).filter(Boolean);

    let html = '';

    // Tabs
    html += '<div class="tabs">';
    html += '<div class="tab' + (activeTab === 'model' ? ' active' : '') + '" onclick="switchTab(\'model\')">📋 模型属性</div>';
    html += '<div class="tab' + (activeTab === 'findings' ? ' active' : '') + '" onclick="switchTab(\'findings\')">⚠️ 疑点清单 <span style="font-size:0.8em;color:#58a6ff">(' + findings.length + ')</span></div>';
    html += '</div>';

    if (activeTab === 'model') {
        // Model edit form
        html += '<div class="form-row">';
        html += '<div class="form-group"><label>模型ID（英文标识，不可修改）</label><input value="' + escHtml(m.id) + '" readonly style="color:#484f58;cursor:not-allowed"></div>';
        html += '<div class="form-group"><label>图标 Emoji</label><input id="editIcon" value="' + escHtml(m.icon||'') + '" onchange="onModelFieldChange()"></div>';
        html += '</div>';
        html += '<div class="form-group"><label>模型名称</label><input id="editName" value="' + escHtml(m.name) + '" onchange="onModelFieldChange()"></div>';
        html += '<div class="form-row">';
        html += '<div class="form-group"><label>分类</label><input id="editCategory" value="' + escHtml(m.category||'') + '" onchange="onModelFieldChange()" placeholder="如：新能源审计、土地审计"></div>';
        html += '</div>';
        html += '<div class="form-group"><label>模型描述</label><textarea id="editDesc" onchange="onModelFieldChange()">' + escHtml(m.desc||'') + '</textarea></div>';
        html += '<div class="form-group"><label>判定阈值 / 规则</label><input id="editThreshold" value="' + escHtml(m.threshold||'') + '" onchange="onModelFieldChange()" placeholder="如：月发电小时数 < 60小时"></div>';
        html += '<div class="form-group"><label>疑点字段（逗号分隔，决定疑点表格有哪些列）</label><input id="editFields" value="' + escHtml(m.fields||'') + '" onchange="onModelFieldChange()" placeholder="如：户名,地址,并网容量(kW),并网时间,月均发电小时"></div>';
        html += '<div class="help">💡 修改字段列表后，建议切换至「疑点清单」页签调整各条疑点的字段值。</div>';

        // Delete model button
        html += '<div style="margin-top:20px;padding-top:12px;border-top:1px solid #21262d">';
        html += '<button class="btn-danger" onclick="deleteModel(\'' + m.id + '\')">🗑 删除此模型</button>';
        html += '<span style="color:#8b949e;font-size:0.75em;margin-left:8px">删除模型将同时删除其下所有疑点数据</span>';
        html += '</div>';
    } else {
        // Findings tab
        html += '<div class="section-title">';
        html += '<span>⚠️ 疑点清单</span>';
        html += '<span class="badge" id="findingBadge">' + findings.length + '</span>';
        html += '<div class="section-actions">';
        html += '<button class="btn-normal" onclick="addFinding()">＋ 添加疑点</button>';
        html += '<button class="btn-normal" onclick="document.getElementById(\'excelFileInput\').click()">📥 导入Excel</button>';
        html += '<input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcelFile(event)">';
        html += '<button class="btn-normal" onclick="importFindingsJSON()">📤 导入JSON</button>';
        html += '<button class="btn-normal" onclick="exportFindingsJSON()">📥 导出JSON</button>';
        if (findings.length > 0) {
            const selCount = _selectedRows.size;
            html += '<button class="btn-accent" onclick="geocodeSelected()" ' + (selCount === 0 ? 'disabled' : '') + '>📍 测试勾选(' + selCount + '条)</button>';
            html += '<button class="btn-danger" onclick="batchClearFindings()">🗑 批量清空</button>';
        }
        html += '</div></div>';

        if (findings.length === 0) {
            html += '<div style="text-align:center;padding:40px;color:#484f58">暂无疑点数据<br><button class="btn-primary" style="margin-top:12px" onclick="addFinding()">＋ 添加第一条疑点</button></div>';
        } else {
            // ★ 分页: 只渲染当前页数据，3000+条也不会卡
            const totalPages = Math.ceil(findings.length / PAGE_SIZE);
            if (currentPage >= totalPages) currentPage = totalPages - 1;
            if (currentPage < 0) currentPage = 0;
            const startIdx = currentPage * PAGE_SIZE;
            const endIdx = Math.min(startIdx + PAGE_SIZE, findings.length);
            const pageFindings = findings.slice(startIdx, endIdx);

            html += '<div class="table-wrap"><table><thead><tr>';
            html += '<th class="sticky-chk"><input type="checkbox" id="selectAllCb" onclick="toggleSelectAll()" style="cursor:pointer;accent-color:#7c3aed" ' + (pageFindings.every((f, pi) => _selectedRows.has(startIdx + pi)) ? 'checked' : '') + '></th>';
            html += '<th class="sticky-num">#</th>';
            const cols = buildColumns(findings);
            const mForLabel = models.find(x => x.id === selectedModelId);
            cols.forEach(col => { html += '<th>' + escHtml(colLabel(col, mForLabel)) + '</th>'; });
            html += '<th style="width:80px">操作</th>';
            html += '</tr></thead><tbody>';

            for (let pi = 0; pi < pageFindings.length; pi++) {
                const f = pageFindings[pi];
                const i = startIdx + pi; // 原始索引
                const checked = _selectedRows.has(i);
                html += '<tr id="findingRow-' + i + '" class="' + (editingFindingIdx === i ? 'selected' : '') + (checked ? 'selected' : '') + '">';
                html += '<td class="sticky-chk"><input type="checkbox" ' + (checked ? 'checked' : '') + ' onclick="toggleRow(' + i + ')" style="cursor:pointer;accent-color:#7c3aed"></td>';
                html += '<td class="sticky-num" style="color:#484f58">' + (i + 1) + '</td>';
                cols.forEach(col => {
                    const val = f[col] != null ? f[col] : '';
                    html += '<td><input class="cell-input' + (typeof val === 'number' ? ' num' : '') + '" value="' + escHtml(String(val)) + '" onchange="onFindingCellChange(' + i + ',\'' + col + '\',this.value)" data-col="' + col + '" data-row="' + i + '"></td>';
                });
                html += '<td class="actions-cell">';
                const attCount = (Array.isArray(f.attachments) ? f.attachments.length : 0);
                const attIcon = attCount > 0 ? '<span title="' + attCount + '个附件" style="cursor:pointer;margin-right:4px" onclick="editFindingRow(' + i + ')">📎' + attCount + '</span>' : '';
                html += attIcon;
                html += '<button onclick="editFindingRow(' + i + ')" title="编辑整行">✏️</button>';
                html += '<button class="danger" onclick="deleteFinding(' + i + ')" title="删除">🗑</button>';
                html += '</td></tr>';
            }
            html += '</tbody></table></div>';

            // ★ 分页导航
            if (totalPages > 1) {
                html += '<div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;padding:6px 0;flex-wrap:wrap">';
                html += '<button class="btn-normal" style="padding:4px 10px;font-size:0.72em" onclick="goPage(0)" ' + (currentPage === 0 ? 'disabled' : '') + '>⏮ 首页</button>';
                html += '<button class="btn-normal" style="padding:4px 10px;font-size:0.72em" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 0 ? 'disabled' : '') + '>◀ 上一页</button>';

                // 页码按钮（显示附近页码）
                const pgStart = Math.max(0, currentPage - 3);
                const pgEnd = Math.min(totalPages, currentPage + 4);
                if (pgStart > 0) html += '<span style="color:#484f58;font-size:0.72em">…</span>';
                for (let pg = pgStart; pg < pgEnd; pg++) {
                    html += '<button class="btn-normal" style="padding:4px 8px;font-size:0.72em;min-width:28px;' +
                        (pg === currentPage ? 'background:#7c3aed;color:#fff;border-color:#7c3aed' : '') +
                        '" onclick="goPage(' + pg + ')">' + (pg + 1) + '</button>';
                }
                if (pgEnd < totalPages) html += '<span style="color:#484f58;font-size:0.72em">…</span>';

                html += '<button class="btn-normal" style="padding:4px 10px;font-size:0.72em" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages - 1 ? 'disabled' : '') + '>下一页 ▶</button>';
                html += '<button class="btn-normal" style="padding:4px 10px;font-size:0.72em" onclick="goPage(' + (totalPages - 1) + ')" ' + (currentPage >= totalPages - 1 ? 'disabled' : '') + '>末页 ⏭</button>';
                html += '<span style="color:#8b949e;font-size:0.7em;margin-left:4px">' + (currentPage + 1) + '/' + totalPages + ' 页 | ' + findings.length + ' 条</span>';
                html += '</div>';
            }
        }
    }

    document.getElementById('contentArea').innerHTML = html;
}

function switchTab(tab) {
    activeTab = tab;
    currentPage = 0;
    editingFindingIdx = -1;
    renderContent();
}

// ===================================================================
//  Column inference from findings — 严格按照模型 fields 配置，多余字段不展示
// ===================================================================
function buildColumns(findings) {
    const m = models.find(x => x.id === selectedModelId);
    const orderedKeys = [];
    const seen = new Set();

    // 中文字段名 → 英文 key 映射表
    const fieldKeyMap = {
        '户名':'name','地址':'addr','并网容量(kW)':'capacity','并网容量':'capacity',
        '并网时间':'gridDate','月均发电小时':'monthlyHours','编号':'id',
        '经度':'lng','纬度':'lat','容量':'capacity','月发电':'monthlyHours',
        '电站名称':'name','装机容量(MW)':'capacity','占地类型':'landType','合规状态':'compliance',
        '地块编号':'id','位置':'addr','占地面积(亩)':'area','原用途':'origUse','现用途':'curUse','变化年份':'changeYear',
        '水体名称':'name','面积(km²)':'area','水质等级':'waterGrade','异常类型':'anomalyType','检测时间':'detectDate',
        '区域名称':'name','变化面积(ha)':'area','NDVI变化量':'ndviChange','变化时间段':'changePeriod','疑似原因':'suspectedCause',
        '项目名称':'name','规划面积(ha)':'planArea','实际面积(ha)':'actualArea','超出比例':'exceedRatio','发现时间':'detectDate',
        '矿山名称':'name','矿权面积(ha)':'rightsArea','越界面积(ha)':'overArea','越界方向':'overDir',
        '林班编号':'id','砍伐面积(ha)':'cutArea','审批面积(ha)':'approvedArea','差异面积(ha)':'diffArea',
        '堆放点编号':'id','占地面积(m²)':'area','疑似类型':'suspectType','距离居民区(m)':'distToResident',
        '岸段编号':'id','变化长度(m)':'changeLength','变化类型':'changeType','变化速率(m/年)':'changeRate','是否审批':'isApproved',
        '坐标':'lat','位置坐标':'addr',
        // Excel常见表头映射（光伏审计数据等）
        '供电单位一级':'dept1','供电单位二级':'dept2','供电单位三级':'dept3',
        '发电客户编号':'id','用户编号':'userId','用户名称':'userName',
        '发电地址':'addr','发电客户名称':'name',
        '并网日期':'gridDate','并网日期(day)':'gridDate',
        '装机容量':'capacity','装机容量(kW)':'capacity',
        '发电量消纳方式':'consumptionMode','并网电压等级':'voltageLevel',
        '纳税人类型':'taxpayerType','发电客户统计时段内最大月发电小时数':'monthlyHours',
        '月发电小时数':'monthlyHours','发电小时数':'monthlyHours',
        '户号':'id','台区名称':'transformerName','台区编号':'transformerId'
    };

    // ★ 严格按模型 fields 配置的顺序生成列
    if (m && m.fields) {
        const fieldNames = m.fields.split(',').map(s => s.trim()).filter(Boolean);
        fieldNames.forEach(fn => {
            const key = fieldKeyMap[fn] || fn;
            if (!seen.has(key)) {
                seen.add(key);
                orderedKeys.push(key);
            }
        });
    }

    // 兜底：如果 fields 未配置，用默认顺序
    if (!orderedKeys.length) {
        ['id','name','addr','capacity','gridDate','monthlyHours'].forEach(k => {
            if (!seen.has(k)) { seen.add(k); orderedKeys.push(k); }
        });
    }

    // lng/lat 始终移到最后，attachments 不参与表格展示
    const finalCols = orderedKeys.filter(k => k !== 'lng' && k !== 'lat' && k !== 'attachments');
    if (orderedKeys.includes('lng')) finalCols.push('lng');
    if (orderedKeys.includes('lat')) finalCols.push('lat');

    return finalCols;
}

// 英文字段 key → 中文显示名（用于表头）
function colLabel(key, model) {
    const keyToCn = {
        'id':'编号','name':'名称','addr':'地址','lng':'经度','lat':'纬度',
        'capacity':'容量','gridDate':'并网时间','monthlyHours':'月发电小时',
        'area':'面积','landType':'占地类型','compliance':'合规状态',
        'origUse':'原用途','curUse':'现用途','changeYear':'变化年份',
        'waterGrade':'水质等级','anomalyType':'异常类型','detectDate':'检测时间',
        'ndviChange':'NDVI变化量','changePeriod':'变化时间段','suspectedCause':'疑似原因',
        'planArea':'规划面积','actualArea':'实际面积','exceedRatio':'超出比例',
        'rightsArea':'矿权面积','overArea':'越界面积','overDir':'越界方向',
        'cutArea':'砍伐面积','approvedArea':'审批面积','diffArea':'差异面积',
        'suspectType':'疑似类型','distToResident':'距离居民区',
        'changeLength':'变化长度','changeType':'变化类型','changeRate':'变化速率','isApproved':'是否审批'
    };
    // 如果模型 fields 中有自定义中文名，优先使用
    if (model && model.fields) {
        const fieldNames = model.fields.split(',').map(s => s.trim()).filter(Boolean);
        // 尝试匹配：找到 key 对应的中文字段名
        for (const fn of fieldNames) {
            // 简单启发式：如果字段名的常见英文映射命中，就用中文
            if (key === 'name' && fn.includes('名')) return fn;
            if (key === 'addr' && (fn.includes('地址') || fn.includes('位置'))) return fn;
            if (key === 'capacity' && fn.includes('容量')) return fn;
            if (key === 'gridDate' && (fn.includes('时间') || fn.includes('日期'))) return fn;
            if (key === 'monthlyHours' && fn.includes('小时')) return fn;
            if (key === 'area' && fn.includes('面积')) return fn;
            if (key === 'lng' && fn.includes('经')) return fn;
            if (key === 'lat' && fn.includes('纬')) return fn;
            if (key === 'id' && (fn.includes('编号') || fn.includes('号'))) return fn;
        }
    }
    return keyToCn[key] || key;
}

function onModelFieldChange() {
    if (!selectedModelId) return;
    const m = models.find(x => x.id === selectedModelId);
    if (!m) return;
    m.icon = document.getElementById('editIcon')?.value || '';
    m.name = document.getElementById('editName')?.value || '';
    m.category = document.getElementById('editCategory')?.value || '';
    m.desc = document.getElementById('editDesc')?.value || '';
    m.threshold = document.getElementById('editThreshold')?.value || '';

function addModel() {
    const name = prompt('请输入新模型名称：', '新审计模型');
    if (!name || !name.trim()) return;
    const id = 'model_' + Date.now();
    const m = {
        id: id,
        name: name.trim(),
        icon: '📋',
        category: '自定义',
        desc: '',
        fields: '编号,名称,地址,经度,纬度',
        threshold: ''
    };
    models.push(m);
    findingsMap[id] = [];
    saveData();
    selectedModelId = id;
    activeTab = 'model';
    renderModelList();
    renderContent();
    showToast('模型「' + name + '」已创建');
}

function deleteModel(id) {
    const m = models.find(x => x.id === id);
    if (!m) return;
    const fCount = (findingsMap[id] || []).length;
    const msg = fCount > 0
        ? '确定删除模型「' + m.name + '」及其下 ' + fCount + ' 条疑点数据？此操作不可恢复。'
        : '确定删除模型「' + m.name + '」？此操作不可恢复。';
    if (!confirm(msg)) return;
    models = models.filter(x => x.id !== id);
    delete findingsMap[id];
    saveData();
    if (selectedModelId === id) {
        selectedModelId = models.length > 0 ? models[0].id : null;
        activeTab = 'model';
    }
    renderModelList();
    if (selectedModelId) renderContent();
    else document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>选择一个模型进行编辑</p></div>';
    showToast('模型「' + m.name + '」已删除');
}

// 分页跳转

    else _selectedRows.add(i);
    renderContent(); // 刷新按钮计数和全选状态
}

// 全选/取消本页
function toggleSelectAll() {
    const findings = findingsMap[selectedModelId] || [];
    const startIdx = currentPage * PAGE_SIZE;
    const endIdx = Math.min(startIdx + PAGE_SIZE, findings.length);
    const allChecked = Array.from({ length: endIdx - startIdx }, (_, pi) => startIdx + pi).every(i => _selectedRows.has(i));
    if (allChecked) {
        for (let i = startIdx; i < endIdx; i++) _selectedRows.delete(i);
    } else {
        for (let i = startIdx; i < endIdx; i++) _selectedRows.add(i);
    }
    renderContent();
}

// 统一测试按钮：对勾选中的条目执行地理编码
async function geocodeSelected() {
    if (_selectedRows.size === 0) { showToast('请先勾选需要测试的条目'); return; }
    const findings = findingsMap[selectedModelId] || [];
    const amapKey = localStorage.getItem('audit_amap_key') || '';
    if (!amapKey) { showToast('请先在主工具页面顶部配置高德Key并保存', true); return; }

    // 收集勾选的无坐标疑点
    const batch = [];
    for (const idx of _selectedRows) {
        if (idx < 0 || idx >= findings.length) continue;
        const f = findings[idx];
        const addr = f.addr || f['发电地址'] || f['地址'] || f['位置'] || '';
        const hasCoord = (f.lng != null && f.lat != null && f.lng !== 0 && f.lat !== 0 && f.lng !== '' && f.lat !== '');
        if (addr && String(addr).trim().length > 3 && !hasCoord) {
            batch.push({ idx, addr: String(addr).trim() });
        }
    }

    if (!batch.length) { showToast('勾选条目均已含坐标，无需处理'); return; }
    if (!confirm('将对 ' + batch.length + ' 条勾选疑点进行地址→坐标转换。\n\n不限速，预计 ' + Math.ceil(batch.length / 8) + ' 秒。\n\n确定开始？')) return;

    showGeocodeProgress(batch.length);
    const startT = performance.now();
    const timings = [];
    let succ = 0, fail = 0;

    for (let j = 0; j < batch.length; j++) {
        const t0 = performance.now();
        const item = batch[j];
        let ok = false;
        try {
            const city = extractCity(item.addr);
            let url = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                '&address=' + encodeURIComponent(item.addr) + '&output=JSON';
            if (city) url += '&city=' + encodeURIComponent(city);
            const r = await fetch(url), d = await r.json();
            if ((d.status === '1' || d.status === 1) && d.geocodes && d.geocodes.length) {
                setCoord(findings, item.idx, d.geocodes[0].location);
                ok = true; succ++;
            } else {
                const fallbacks = buildFallbackAddrs(item.addr);
                for (const fb of fallbacks) {
                    const c2 = extractCity(fb);
                    let u2 = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                        '&address=' + encodeURIComponent(fb) + '&output=JSON';
                    if (c2) u2 += '&city=' + encodeURIComponent(c2);
                    const r2 = await fetch(u2), d2 = await r2.json();
                    if ((d2.status === '1' || d2.status === 1) && d2.geocodes && d2.geocodes.length) {
                        setCoord(findings, item.idx, d2.geocodes[0].location);
                        ok = true; succ++;
                        break;
                    }
                }
                if (!ok) fail++;
            }
        } catch(e) { fail++; }

        const ms = Math.round((performance.now() - t0) * 10) / 10;
        timings.push({ addr: item.addr.substring(0, 30), ok, ms });
        updateGeocodeProgress(j + 1, batch.length, succ, fail);
    }

    const totalMs = Math.round(performance.now() - startT);
    syncLngLatFields();
    saveData();
    currentPage = Math.floor(batch[0].idx / PAGE_SIZE);
    renderContent();
    renderModelList();

    // 弹窗报告
    const quickest = Math.min(...timings.map(t => t.ms));
    const slowest = Math.max(...timings.map(t => t.ms));
    const avgMs = Math.round(timings.reduce((s, t) => s + t.ms, 0) / timings.length * 10) / 10;
    let log = '⏱ 勾选测试报告\n';
    log += '━━━━━━━━━━━━━━━━━━━━━━━━━\n';
    log += '耗时: ' + totalMs + 'ms (' + (totalMs/1000).toFixed(1) + 's) | 平均: ' + avgMs + 'ms | ' +
        '最快: ' + quickest + 'ms | 最慢: ' + slowest + 'ms\n';
    log += '速率: ' + Math.round(batch.length / (totalMs / 1000)) + '条/秒\n';
    log += '成功: ' + succ + ' | 失败: ' + fail + '\n';
    log += '━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
    timings.forEach((t, i) => {
        const f = findings[batch[i].idx];
        log += (i + 1).toString().padStart(batch.length > 100 ? 3 : 2) + '. [' + (t.ok ? '✅' : '❌') + ' ' + t.ms + 'ms] ' + t.addr + '\n';
        if (t.ok && f.lng) log += '    → lng=' + f.lng.toFixed(6) + ' lat=' + f.lat.toFixed(6) + '\n';
    });

    const overlay = document.getElementById('geocodeModal');
    if (overlay) {
        overlay.innerHTML = '<div class="modal" style="width:640px;max-width:95vw;text-align:left">' +
            '<h3 style="color:#3fb950">✅ 勾选测试完成 — 坐标已写入</h3>' +
            '<pre style="background:#0d1117;color:#7ee787;border:1px solid #30363d;border-radius:6px;padding:12px;margin:12px 0;font-size:0.72em;line-height:1.6;white-space:pre-wrap;max-height:350px;overflow-y:auto;font-family:monospace">' + escHtml(log) + '</pre>' +
            '<button class="btn-accent" onclick="closeGeocodeModal()" style="width:100%">关闭查看表格</button>' +
            '</div>';
    }
}

function addFinding() {
    const findings = findingsMap[selectedModelId] || [];
    const m = models.find(x => x.id === selectedModelId);
    // 只用 fields 配置的列创建新疑点
    const cols = buildColumns(findings.length ? findings : [{id:'_',name:''}]);
    const newFinding = {};
    cols.forEach(k => { newFinding[k] = defaultFieldValue(k, findings); });
    findings.push(newFinding);
    findingsMap[selectedModelId] = findings;
    saveData();
    renderContent();
    renderModelList();
    showToast('疑点「' + (newFinding.id || 'F' + findings.length) + '」已添加');
}

// 字段默认值
function defaultFieldValue(key, findings) {
    switch (key) {
        case 'id': return 'F' + String(findings.length + 1).padStart(3, '0');
        case 'name': return '新疑点' + (findings.length + 1);
        case 'addr': return '请填写地址';
        case 'lng': return 120.55 + (Math.random() - 0.5) * 0.2;
        case 'lat': return 31.90 + (Math.random() - 0.5) * 0.1;
        case 'capacity': return 0;
        case 'gridDate': return '2024-01-01';
        case 'monthlyHours': return 0;

// ===================================================================
//  WGS-84 ↔ GCJ-02 坐标转换（高德返回GCJ-02，需转为WGS-84存储）
// ===================================================================
const GeoPI = Math.PI, GeoAX = 6378245, GeoEE = 0.00669342162296594323;
function _geoTLat(x, y) { let r = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x)); r += (20*Math.sin(6*x*GeoPI)+20*Math.sin(2*x*GeoPI))*2/3; r += (20*Math.sin(y*GeoPI)+40*Math.sin(y/3*GeoPI))*2/3; r += (160*Math.sin(y/12*GeoPI)+320*Math.sin(y*GeoPI/30))*2/3; return r; }
function _geoTLon(x, y) { let r = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x)); r += (20*Math.sin(6*x*GeoPI)+20*Math.sin(2*x*GeoPI))*2/3; r += (20*Math.sin(x*GeoPI)+40*Math.sin(x/3*GeoPI))*2/3; r += (150*Math.sin(x/12*GeoPI)+300*Math.sin(x/30*GeoPI))*2/3; return r; }
function wgs2gcj(lng, lat) { const dLat = _geoTLat(lng-105,lat-35), dLon = _geoTLon(lng-105,lat-35); const r = lat/180*GeoPI; const m = 1 - GeoEE*Math.sin(r)*Math.sin(r); const s = Math.sqrt(m); return { lng: lng + dLon*180/(GeoAX/s*Math.cos(r)*GeoPI), lat: lat + dLat*180/(GeoAX*(1-GeoEE)/(m*s)*GeoPI) }; }
function gcj2wgs(lng, lat) { let w = { lng, lat }; for (let i = 0; i < 5; i++) { const t = wgs2gcj(w.lng, w.lat); w.lng += lng - t.lng; w.lat += lat - t.lat; } return w; }

// ===================================================================
//  批量地址→坐标（高德地理编码，自动提取city参数缩小范围）
// ===================================================================
let _geocodeRunning = false, _geocodeAborted = false;

// 把高德返回的location字符串写入疑点
function setCoord(findings, idx, locationStr) {
    const parts = locationStr.split(',');
    const wgs = gcj2wgs(parseFloat(parts[0]), parseFloat(parts[1]));
    findings[idx].lng = Math.round(wgs.lng * 1000000) / 1000000;
    findings[idx].lat = Math.round(wgs.lat * 1000000) / 1000000;
}

// 渐进式降级地址：完整→去门牌→去掉路名 → 返回降级列表
function buildFallbackAddrs(addr) {
    const result = [];
    // lv1: 去门牌号/幢/栋
    const lv1 = addr.replace(/[\d\-\—–]+号.*$/g, '').replace(/[\d]+[幢栋单元楼].*$/g, '').replace(/[（(].*?[)）]/g, '').trim();
    if (lv1 !== addr && lv1.length > 3) result.push(lv1);
    // lv2: 去掉路名及其后面的数字
    const lv2 = addr.replace(/[一-鿿\d]*[路街巷道弄](?:\d.*)?$/u, '').trim();
    if (lv2 !== addr && lv2.length > 4 && !result.includes(lv2)) result.push(lv2);
    return result;
}

// 从地址中提取城市名（用于city参数）
function extractCity(addr) {
    const m1 = addr.match(/([一-龥]{2,6}(?:市|县|区|旗))/);
    if (m1) return m1[1];
    const m2 = addr.match(/([一-龥]{2,10})(?:市|县|区|镇|乡|街道)/);
    if (m2) return m2[1];
    return '';
}

// 批量测试 n 条：顺序执行，显示逐条耗时和对性能的影响
async function testGeocodeBatch(n) {
    const findings = findingsMap[selectedModelId] || [];
    if (!findings.length) { showToast('无疑点数据'); return; }

    const amapKey = localStorage.getItem('audit_amap_key') || '';
    if (!amapKey) { showToast('请先在主工具页面顶部配置高德Key并保存', true); return; }

    // 收集前 n 条无坐标的疑点
    const batch = [];
    for (let i = 0; i < findings.length && batch.length < n; i++) {
        const f = findings[i];
        const addr = f.addr || f['发电地址'] || f['地址'] || f['位置'] || '';
        const hasCoord = (f.lng != null && f.lat != null && f.lng !== 0 && f.lat !== 0 && f.lng !== '' && f.lat !== '');
        if (addr && String(addr).trim().length > 3 && !hasCoord) {
            batch.push({ idx: i, addr: String(addr).trim() });
        }
    }

    if (!batch.length) { showToast('所有疑点已有坐标'); return; }
    if (!confirm('将对 ' + batch.length + ' 条疑点进行顺序地理编码测试。\n\n实时显示逐条耗时，不限制速率，感受最大性能。\n\n确定开始？')) return;

    showGeocodeProgress(batch.length);
    const startTime = performance.now();
    const timings = [];
    let succ = 0, fail = 0;

    for (let j = 0; j < batch.length; j++) {
        const t0 = performance.now();
        const item = batch[j];
        let ok = false;
        try {
            const city = extractCity(item.addr);
            let url = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                '&address=' + encodeURIComponent(item.addr) + '&output=JSON';
            if (city) url += '&city=' + encodeURIComponent(city);
            const r = await fetch(url), d = await r.json();
            if ((d.status === '1' || d.status === 1) && d.geocodes && d.geocodes.length) {
                const loc = d.geocodes[0].location.split(',');
                const wgs = gcj2wgs(parseFloat(loc[0]), parseFloat(loc[1]));
                findings[item.idx].lng = Math.round(wgs.lng * 1000000) / 1000000;
                findings[item.idx].lat = Math.round(wgs.lat * 1000000) / 1000000;
                ok = true; succ++;
            } else {
                // 降级1：去门牌号（如"6号"→去除，保留"星北路"）
                const sa = item.addr.replace(/[\d\-\—–]+号.*$/g, '').replace(/[\d]+幢.*$/g, '').replace(/[\d]+栋.*$/g, '').trim();
                if (sa !== item.addr && sa.length > 3) {
                    const c2 = extractCity(sa);
                    let u2 = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                        '&address=' + encodeURIComponent(sa) + '&output=JSON';
                    if (c2) u2 += '&city=' + encodeURIComponent(c2);
                    const r2 = await fetch(u2), d2 = await r2.json();
                    if ((d2.status === '1' || d2.status === 1) && d2.geocodes && d2.geocodes.length) {
                        setCoord(findings, item.idx, d2.geocodes[0].location);
                        ok = true; succ++;
                    }
                }
                if (!ok) {
                    // 降级2：去掉路名+门牌，只保留行政区划（如"经开区横林镇"→缩小到"常州市"范围搜）
                    const sa2 = item.addr.replace(/[一-鿿]*[路街巷道弄](?:\d.*)?$/u, '')
                        .replace(/[\d\-\—–号幢栋单元].*/g, '').replace(/[（(].*?[)）]/g, '').trim();
                    if (sa2 !== item.addr && sa2.length > 4) {
                        const c3 = extractCity(sa2) || extractCity(item.addr);
                        let u3 = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                            '&address=' + encodeURIComponent(sa2) + '&output=JSON';
                        if (c3) u3 += '&city=' + encodeURIComponent(c3);
                        const r3 = await fetch(u3), d3 = await r3.json();
                        if ((d3.status === '1' || d3.status === 1) && d3.geocodes && d3.geocodes.length) {
                            setCoord(findings, item.idx, d3.geocodes[0].location);
                            ok = true; succ++;
                        } else { fail++; }
                    } else { fail++; }
                }
            }
        } catch(e) { fail++; }

        const t1 = performance.now();
        const elapsed = Math.round((t1 - t0) * 10) / 10;
        timings.push({ addr: item.addr.substring(0, 30), ok, ms: elapsed });
        updateGeocodeProgress(j + 1, batch.length, succ, fail);
    }

    const totalMs = Math.round(performance.now() - startTime);
    syncLngLatFields();
    saveData();
    // 跳到第一条测试数据所在页
    const firstTestIdx = batch[0].idx;
    currentPage = Math.floor(firstTestIdx / PAGE_SIZE);
    renderContent();
    renderModelList();

    // 显示详细性能报告 + 坐标结果
    const quickest = Math.min(...timings.map(t => t.ms));
    const slowest = Math.max(...timings.map(t => t.ms));
    const avgMs = Math.round(timings.reduce((s, t) => s + t.ms, 0) / timings.length * 10) / 10;
    const reqsPerSec = Math.round(batch.length / (totalMs / 1000));

    let log = '⏱ 性能测试报告\n';
    log += '━━━━━━━━━━━━━━━━━━━━━━━━━\n';
    log += '总耗时:   ' + totalMs + 'ms (' + (totalMs/1000).toFixed(1) + 's)\n';
    log += '平均耗时: ' + avgMs + 'ms/条\n';
    log += '最快:     ' + quickest + 'ms | 最慢: ' + slowest + 'ms\n';
    log += '估算速率: ' + reqsPerSec + ' 条/秒\n';
    log += '成功: ' + succ + ' | 失败: ' + fail + '\n';
    log += '━━━━━━━━━━━━━━━━━━━━━━━━━\n\n逐条结果（坐标已写入疑点明细）:\n';
    timings.forEach((t, i) => {
        const f = findings[batch[i].idx];
        const coord = f.lng ? ('lng=' + f.lng.toFixed(6) + ' lat=' + f.lat.toFixed(6)) : '(未获取)';
        log += (i + 1).toString().padStart(2) + '. [' + (t.ok ? '✅' : '❌') + ' ' + t.ms + 'ms] ' + t.addr + '\n';
        if (t.ok) log += '    → ' + coord + '\n';
    });

    const overlay = document.getElementById('geocodeModal');
    if (overlay) {
        overlay.innerHTML = '<div class="modal" style="width:620px;max-width:95vw;text-align:left">' +
            '<h3 style="color:#3fb950">⏱ 性能测试完成 — 坐标已写入</h3>' +
            '<pre style="background:#0d1117;color:#7ee787;border:1px solid #30363d;border-radius:6px;padding:12px;margin:12px 0;font-size:0.72em;line-height:1.6;white-space:pre-wrap;max-height:350px;overflow-y:auto;font-family:monospace">' + escHtml(log) + '</pre>' +
            '<div style="display:flex;gap:8px">' +
            '<button class="btn-accent" onclick="closeGeocodeModal()" style="flex:1">关闭查看表格</button>' +
            '</div></div>';
    }
}

// 自动同步模型字段：确保经度、纬度字段存在于模型配置末尾
function syncLngLatFields() {
    const m = models.find(x => x.id === selectedModelId);
    if (!m) return;
    const fields = (m.fields || '').split(',').map(s => s.trim()).filter(Boolean);
    let changed = false;
    if (!fields.includes('经度') && !fields.some(f => /经度|lng/i.test(f))) {
        fields.push('经度');
        changed = true;
    }
    if (!fields.includes('纬度') && !fields.some(f => /纬度|lat/i.test(f))) {
        fields.push('纬度');
        changed = true;
    }
    if (changed) {
        m.fields = fields.join(',');
        saveData();
    }
}

    } catch(e) {
        const detail = document.getElementById('geocodeDetail');
        if (detail) detail.textContent = '⚠️ 网络错误: ' + e.message;
        await new Promise(r => setTimeout(r, 3000));
        finalizeGeocodeProgress(0, needGeocode.length, ['连通测试失败: 请检查网络连接或高德Key是否正确']);
        return;
    }

    if (!confirm('将为 ' + needGeocode.length + ' 条疑点进行地址→坐标转换。\n\n使用高德地理编码（自动限定城市范围），约 8条/秒。\n预计耗时 ' + Math.ceil(needGeocode.length/8) + ' 秒。\n\n确定开始？')) {
        closeGeocodeModal();
        return;
    }

    _geocodeRunning = true; _geocodeAborted = false;
    let success = 0, fail = 0;
    const errors = []; // 记录前几个失败原因

    for (let j = 0; j < needGeocode.length; j++) {
        if (_geocodeAborted) break;
        const item = needGeocode[j];
        try {
            const city = extractCity(item.addr);
            let url = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                '&address=' + encodeURIComponent(item.addr) + '&output=JSON';
            if (city) url += '&city=' + encodeURIComponent(city);

            const r = await fetch(url), d = await r.json();
            // 放宽条件：status可能是字符串"1"或数字1
            if ((d.status === '1' || d.status === 1) && d.geocodes && d.geocodes.length) {
                const loc = d.geocodes[0].location.split(',');
                const gcjLng = parseFloat(loc[0]), gcjLat = parseFloat(loc[1]);
                const wgs = gcj2wgs(gcjLng, gcjLat);
                findings[item.idx].lng = Math.round(wgs.lng * 1000000) / 1000000;
                findings[item.idx].lat = Math.round(wgs.lat * 1000000) / 1000000;
                success++;
            } else {
                // 降级1：去掉详细门牌号
                const shortAddr = item.addr.replace(/[\d\-\—–]+号.*$/g, '').replace(/[\d]+幢.*$/g, '').replace(/[\d]+栋.*$/g, '').replace(/[\d]+单元.*$/g, '').trim();
                if (shortAddr !== item.addr && shortAddr.length > 3) {
                    const city2 = extractCity(shortAddr);
                    let url2 = 'https://restapi.amap.com/v3/geocode/geo?key=' + amapKey +
                        '&address=' + encodeURIComponent(shortAddr) + '&output=JSON';
                    if (city2) url2 += '&city=' + encodeURIComponent(city2);
                    const r2 = await fetch(url2), d2 = await r2.json();
                    if ((d2.status === '1' || d2.status === 1) && d2.geocodes && d2.geocodes.length) {
                        const loc2 = d2.geocodes[0].location.split(',');
                        const gcjLng2 = parseFloat(loc2[0]), gcjLat2 = parseFloat(loc2[1]);
                        const wgs2 = gcj2wgs(gcjLng2, gcjLat2);
                        findings[item.idx].lng = Math.round(wgs2.lng * 1000000) / 1000000;
                        findings[item.idx].lat = Math.round(wgs2.lat * 1000000) / 1000000;
                        success++;
                    } else { fail++; if (errors.length < 5) errors.push(item.addr.substring(0, 40) + '... → ' + (d.info || d2.info || '无结果')); }
                } else { fail++; if (errors.length < 5) errors.push(item.addr.substring(0, 40) + '... → ' + (d.info || '无结果')); }
            }
        } catch(e) { fail++; if (errors.length < 3) errors.push('网络错误: ' + e.message); }
        updateGeocodeProgress(j + 1, needGeocode.length, success, fail);
        // 每50条自动保存，防止意外中断丢失进度
        if ((j + 1) % 50 === 0) saveData();
        // 速率控制：~7条/秒，3000条约7分钟，避免触发限流
        if (j % 7 === 0 && j > 0) await new Promise(r => setTimeout(r, 1000));
    }

    _geocodeRunning = false;
    syncLngLatFields();
    renderContent();
    renderModelList();
    finalizeGeocodeProgress(success, fail, errors);
}

// 进度弹窗
function showGeocodeProgress(total) {
    let overlay = document.getElementById('geocodeModal');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'geocodeModal';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
    }
    overlay.innerHTML = '<div class="modal" style="width:450px;text-align:center">' +
        '<h3 style="color:#d2a8ff">📍 批量地址→坐标</h3>' +
        '<div id="geocodeBar" style="width:100%;height:8px;background:#21262d;border-radius:4px;margin:16px 0;overflow:hidden">' +
        '<div id="geocodeFill" style="width:0%;height:100%;background:#3fb950;transition:width 0.3s;border-radius:4px"></div></div>' +
        '<div id="geocodeStatus" style="color:#c9d1d9;font-size:0.85em">准备中...</div>' +
        '<div id="geocodeDetail" style="color:#8b949e;font-size:0.72em;margin-top:4px"></div>' +

function updateGeocodeProgress(done, total, success, fail) {
    const fill = document.getElementById('geocodeFill');
    const status = document.getElementById('geocodeStatus');
    const detail = document.getElementById('geocodeDetail');
    if (fill) fill.style.width = (done / total * 100) + '%';
    if (status) status.textContent = done + ' / ' + total + '  ✅' + success + '  ❌' + fail;
    if (detail) detail.textContent = '速度: ~8条/秒，剩余约 ' + Math.ceil((total - done) / 8) + ' 秒';
}

function abortGeocode() {
    _geocodeAborted = true;
    const status = document.getElementById('geocodeStatus');
    if (status) status.textContent = '⏸ 已中止，正在保存已处理的数据...';
}

function closeGeocodeModal() {
    const overlay = document.getElementById('geocodeModal');
    if (overlay) overlay.style.display = 'none';
}

function finalizeGeocodeProgress(success, fail, errors) {
    const overlay = document.getElementById('geocodeModal');
    if (!overlay) return;
    const errList = (errors && errors.length) ? errors : [];
    let html = '<div class="modal" style="width:500px;max-width:95vw;text-align:center;max-height:80vh;overflow-y:auto">' +
        '<h3 style="color:' + (success > 0 ? '#3fb950' : '#ff7b72') + '">' + (success > 0 ? '✅' : '❌') + ' 批量地理编码完成</h3>' +
        '<div style="font-size:1.2em;margin:16px 0;color:#c9d1d9">📍 成功 <b style="color:#3fb950">' + success + '</b> 条 | 失败 <b style="color:#ff7b72">' + fail + '</b> 条</div>';
    if (errList.length > 0) {
        html += '<div style="text-align:left;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;margin-bottom:12px;max-height:160px;overflow-y:auto">';
        html += '<div style="color:#ff7b72;font-size:0.75em;margin-bottom:4px">⚠️ 失败原因示例：</div>';
        errList.forEach(e => { html += '<div style="color:#8b949e;font-size:0.7em;padding:2px 0;border-bottom:1px solid #21262d">' + escHtml(e) + '</div>'; });
        if (fail > errList.length) html += '<div style="color:#484f58;font-size:0.7em;padding:2px 0">… 及其他' + (fail - errList.length) + '条</div>';
        html += '</div>';
    }
    html += '<div style="color:#8b949e;font-size:0.78em">坐标已保存为WGS-84格式</div>' +
        '<button class="btn-accent" onclick="closeGeocodeModal()" style="margin-top:12px">关闭</button>' +
        '</div>';
    overlay.innerHTML = html;
}

// 渲染附件列表（缩略图/文件名）
function renderAttachmentList(atts) {
    if (!atts || !atts.length) return '<div style="color:#484f58;font-size:0.75em;text-align:center;padding:8px">暂无附件</div>';
    return atts.map((a, i) => {
        const sizeStr = a.size ? (a.size > 1024*1024 ? (a.size/(1024*1024)).toFixed(1)+'MB' : (a.size/1024).toFixed(1)+'KB') : '';
        return '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin:3px 0;background:#161b22;border-radius:4px;border:1px solid #21262d">' +
            (a.type && a.type.startsWith('image/')
                ? '<img src="' + a.data + '" style="width:36px;height:36px;object-fit:cover;border-radius:3px;border:1px solid #30363d">'
                : '<span style="font-size:1.4em">📄</span>') +
            '<div style="flex:1;min-width:0">' +
                '<div style="font-size:0.75em;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + escHtml(a.name) + '">' + escHtml(a.name) + '</div>' +
                (sizeStr ? '<div style="font-size:0.68em;color:#484f58">' + sizeStr + '</div>' : '') +
            '</div>' +
            '<button class="btn-normal" style="font-size:0.65em;padding:2px 6px;color:#ff7b72" onclick="removeAttachment(' + i + ')">✕</button>' +
        '</div>';
    }).join('');
}

// 处理文件上传 → base64，附件数据存在弹窗元素上
function handleAttachmentUpload(input) {
    if (!editFindingModal) return;
    const atts = editFindingModal._attachments || [];
    const errDiv = document.getElementById('attachmentError');
    errDiv.style.display = 'none';
    const files = Array.from(input.files);
    if (!files.length) return;

    let totalSize = atts.reduce((s, a) => s + (a.size || 0), 0);
    const MAX_TOTAL = 8 * 1024 * 1024; // 8MB total

    files.forEach(file => {
        if (file.size > 2 * 1024 * 1024) {
            errDiv.textContent = '⚠️ "' + file.name + '" 超过2MB限制，已跳过';
            errDiv.style.display = 'block';
            return;
        }
        if (totalSize + file.size > MAX_TOTAL) {
            errDiv.textContent = '⚠️ 附件总大小超过8MB，部分文件已跳过';
            errDiv.style.display = 'block';
            return;
        }
        totalSize += file.size;
        const reader = new FileReader();
        reader.onload = function(e) {
            atts.push({
                name: file.name,
                type: file.type,
                size: file.size,
                data: e.target.result,
                addedAt: new Date().toISOString()
            });
            editFindingModal._attachments = atts;
            // 刷新列表
            const listEl = document.getElementById('attachmentList');
            if (listEl) listEl.innerHTML = renderAttachmentList(atts);
        };
        reader.readAsDataURL(file);
    });
    input.value = '';
}

// 删除附件
function removeAttachment(i) {
    if (!editFindingModal || !editFindingModal._attachments) return;
    editFindingModal._attachments.splice(i, 1);
    const listEl = document.getElementById('attachmentList');
    if (listEl) listEl.innerHTML = renderAttachmentList(editFindingModal._attachments);
}

// 关闭弹窗时清理
function closeEditModal() {
    if (editFindingModal) {
        editFindingModal.style.display = 'none';
        delete editFindingModal._attachments;
        editFindingModal = null;
    }
    editingFindingIdx = -1;
}

function saveEditModal(idx) {
    const findings = findingsMap[selectedModelId] || [];
    if (idx < 0 || idx >= findings.length) return;
    const f = findings[idx];
    const cols = buildColumns(findings);
    // 只保存配置字段，清理多余字段
    const saved = {};
    const inputs = document.querySelectorAll('#editModal input[data-key]');
    inputs.forEach(inp => {
        const key = inp.getAttribute('data-key');
        const val = inp.value;
        const numVal = parseFloat(val);
        saved[key] = isNaN(numVal) ? val : numVal;
    });
    // 确保配置列都存在（即使用户没改）
    cols.forEach(k => { if (!(k in saved)) saved[k] = f[k] != null ? f[k] : ''; });
    // 保存附件（从弹窗元素读取）
    const atts = editFindingModal && editFindingModal._attachments ? editFindingModal._attachments : [];
    if (atts.length > 0) saved.attachments = JSON.parse(JSON.stringify(atts));
    else delete saved.attachments;
    findings[idx] = saved;
    saveData();
    closeEditModal();
    renderContent();
    renderModelList();
    showToast('疑点「' + (saved.name || saved.id) + '」已更新' + (saved.attachments ? '（含' + saved.attachments.length + '个附件）' : ''));
}

function exportFindingsJSON() {
    const findings = findingsMap[selectedModelId] || [];
    if (!findings.length) { showToast('当前模型无疑点数据', true); return; }
    const m = models.find(x => x.id === selectedModelId);
    const blob = new Blob([JSON.stringify(findings, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'findings_' + (m ? m.id : 'unknown') + '_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    showToast('疑点JSON已下载');
}

function importFindingsJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                if (!Array.isArray(data)) { showToast('JSON格式错误：需要数组', true); return; }
                if (!data.length) { showToast('数组为空', true); return; }
                // Merge or replace?
                const action = confirm('点击"确定"替换当前疑点数据，点击"取消"追加到现有数据。');
                if (action) {
                    findingsMap[selectedModelId] = data;
                } else {
                    findingsMap[selectedModelId] = (findingsMap[selectedModelId] || []).concat(data);
                }
                syncLngLatFields();
                currentPage = Math.floor(testItem.idx / PAGE_SIZE);
                renderContent();
                renderModelList();
                showToast('已导入 ' + data.length + ' 条疑点');
            } catch(ex) {
                showToast('JSON解析失败: ' + ex.message, true);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

// 点击"导入Excel"按钮 → 文件对话框 → 解析 → 预览确认 → 导入
function importExcelFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const wb = XLSX.read(e.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            if (!rows.length) { showToast('文件为空', true); return; }

            // 第一行 = 表头
            const headers = rows[0].map(h => String(h || '').trim()).filter(Boolean);
            if (!headers.length) { showToast('未检测到表头', true); return; }

            // 数据行（跳过空行）
            const dataRows = rows.slice(1).filter(r => r.some(c => String(c || '').trim() !== ''));
            if (!dataRows.length) { showToast('无数据行', true); return; }

            // 将表头映射为字段key
            const fkMap = getFieldKeyMap();
            const colKeys = headers.map(h => fkMap[h] || h);

            // 解析所有数据行
            const parsed = dataRows.map(row => {
                const obj = {};
                headers.forEach((h, i) => {
                    const key = colKeys[i];
                    let val = row[i] != null ? String(row[i]).trim() : '';
                    // 尝试转为数字
                    const num = parseFloat(val);
                    obj[key] = (!isNaN(num) && val !== '' && !/^[一-鿿]/.test(val)) ? num : val;
                });
                return obj;
            });

            // 显示预览确认弹窗
            showImportPreview(headers, colKeys, parsed);
        } catch(ex) {
            showToast('文件解析失败: ' + ex.message, true);
        }
    };
    reader.readAsArrayBuffer(file);
    event.target.value = '';
}

// 预览弹窗 — 展示表头映射 + 数据概览
function showImportPreview(headers, colKeys, data) {
    const m = models.find(x => x.id === selectedModelId);
    const modelName = m ? m.name : '当前模型';

    // 构建表头映射预览
    let mappingHtml = '<table style="width:100%;font-size:0.72em;border-collapse:collapse;margin:8px 0">';
    mappingHtml += '<tr style="color:#8b949e"><th style="text-align:left;padding:4px 8px;border-bottom:1px solid #21262d">Excel表头</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid #21262d">→ 字段Key</th></tr>';
    headers.forEach((h, i) => {
        const key = colKeys[i];
        const isKnown = key !== h;
        mappingHtml += '<tr><td style="padding:3px 8px;border-bottom:1px solid #21262d;color:#c9d1d9">' + escHtml(h) + '</td>' +
            '<td style="padding:3px 8px;border-bottom:1px solid #21262d;color:' + (isKnown ? '#3fb950' : '#d2991d') + '">' + escHtml(key) + (isKnown ? '' : ' <span style="font-size:0.85em">(新)</span>') + '</td></tr>';
    });
    mappingHtml += '</table>';

    // 数据预览（前3行）
    let previewHtml = '<div style="max-height:160px;overflow-y:auto;font-size:0.7em;line-height:1.4;color:#7ee787;background:#0d1117;padding:8px;border-radius:4px;margin-top:8px;font-family:monospace">';
    data.slice(0, 3).forEach((row, i) => {
        const parts = [];
        headers.forEach(h => { const key = colKeys[headers.indexOf(h)]; if (row[key] !== '' && row[key] != null) parts.push(h + '=' + row[key]); });
        previewHtml += '<div style="margin:2px 0">#' + (i+1) + ' ' + escHtml(parts.join(' | ').substring(0, 200)) + '</div>';
    });
    if (data.length > 3) previewHtml += '<div style="color:#484f58">… 共 ' + data.length + ' 条数据</div>';
    previewHtml += '</div>';

    // 弹窗
    const html = '<h3>📥 导入Excel疑点数据</h3>' +
        '<div style="color:#d2a8ff;margin-bottom:8px">目标模型: <b>' + escHtml(modelName) + '</b></div>' +
        '<div style="color:#c9d1d9;margin-bottom:4px">📋 检测到 <b>' + headers.length + '</b> 个字段，<b>' + data.length + '</b> 条疑点数据</div>' +
        '<div style="color:#d2991d;font-size:0.75em;margin-bottom:4px">⚠️ 导入后将自动同步模型字段配置</div>' +
        '<div style="margin:10px 0"><b style="font-size:0.82em;color:#8b949e">字段映射：</b>' + mappingHtml + '</div>' +
        '<div><b style="font-size:0.82em;color:#8b949e">数据预览：</b>' + previewHtml + '</div>' +
        '<div class="btn-row">' +
        '<button class="btn-normal" onclick="closeImportModal()">取消</button>' +
        '<button class="btn-normal" onclick="doImportExcel(\'append\')">追加到现有</button>' +
        '<button class="btn-accent" onclick="doImportExcel(\'replace\')">替换现有数据</button>' +
        '</div>';

    let overlay = document.getElementById('importModal');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'importModal';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
    }
    overlay.innerHTML = '<div class="modal" style="width:680px;max-width:95vw;max-height:90vh;overflow-y:auto">' + html + '</div>';
    overlay.style.display = 'flex';
    overlay._importHeaders = headers;
    overlay._importColKeys = colKeys;
    overlay._importData = data;
    overlay.onclick = function(e) { if (e.target === overlay) closeImportModal(); };
}

function closeImportModal() {
    const overlay = document.getElementById('importModal');
    if (overlay) { overlay.style.display = 'none'; overlay._importData = null; }
}

function doImportExcel(mode) {
    const overlay = document.getElementById('importModal');
    if (!overlay || !overlay._importData) return;
    const headers = overlay._importHeaders;
    const data = overlay._importData;

    if (mode === 'replace') {
        findingsMap[selectedModelId] = data;
    } else {
        findingsMap[selectedModelId] = (findingsMap[selectedModelId] || []).concat(data);
    }

    // ★ 同步模型字段配置
    const m = models.find(x => x.id === selectedModelId);
    if (m) {
        m.fields = headers.join(',');
    }

    saveData();
    closeImportModal();
    renderContent();
    renderModelList();
    showToast('✅ 已导入 ' + data.length + ' 条疑点，字段配置已同步 (' + headers.length + '个字段)');
}

// 批量清空当前模型疑点
function batchClearFindings() {
    const findings = findingsMap[selectedModelId] || [];
    if (!findings.length) { showToast('无疑点可清空'); return; }
    if (!confirm('⚠️ 确定清空当前模型下全部 ' + findings.length + ' 条疑点数据？\n\n此操作不可恢复！')) return;
    findingsMap[selectedModelId] = [];
    saveData();
    renderContent();
    renderModelList();
    showToast('已清空全部疑点');
}

// ===================================================================
//  Global import/export
// ===================================================================
function exportAll() {
    const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        models: models,
        findings: findingsMap
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audit_models_findings_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    showToast('全部数据已导出（' + models.length + ' 个模型）');
}

function importAll(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.models || !Array.isArray(data.models)) { showToast('数据格式错误：缺少 models 数组', true); return; }
            if (!data.findings || typeof data.findings !== 'object') { showToast('数据格式错误：缺少 findings 对象', true); return; }
            if (!confirm('即将导入 ' + data.models.length + ' 个模型及对应疑点数据。\n\n此操作将覆盖当前所有数据，确定继续？')) return;
            models = data.models;
            findingsMap = data.findings;
            saveData();
            selectedModelId = models.length > 0 ? models[0].id : null;
            activeTab = 'model';
            renderModelList();
            if (selectedModelId) renderContent();
            else document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>选择一个模型进行编辑</p></div>';
            showToast('已导入 ' + data.models.length + ' 个模型');
        } catch(ex) {
            showToast('JSON解析失败: ' + ex.message, true);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function resetToDefault() {
    if (!confirm('确定恢复为默认数据？\n\n此操作将丢弃所有自定义修改！')) return;
    models = JSON.parse(JSON.stringify(DEFAULT_MODELS));
    findingsMap = JSON.parse(JSON.stringify(DEFAULT_FINDINGS));
    saveData();
    selectedModelId = models.length > 0 ? models[0].id : null;
    activeTab = 'model';
    renderModelList();
    if (selectedModelId) renderContent();
    showToast('已恢复默认数据');
}

// ===================================================================
//  Utility
// ===================================================================
function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ===================================================================
//  Keyboard shortcuts
// ===================================================================
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        saveData();
        showToast('数据已保存');
    }
});

// ===================================================================
//  Startup
// ===================================================================
init();
</script>
</body>
</html>
